<!doctype html>
<html lang="fr">
<body style="margin:0;background:#f6f6f6;font-family:Arial,sans-serif;color:#111;">
  <div style="max-width:680px;margin:0 auto;padding:28px;">
    <div style="background:#080808;color:#fff;padding:24px;border-radius:10px 10px 0 0;">
      <p style="margin:0 0 8px;color:#d4af37;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;">SenPrinTech</p>
      <h1 style="margin:0;font-size:24px;">Nouveau message contact</h1>
    </div>
    <div style="background:#fff;padding:24px;border:1px solid #eee;border-top:0;border-radius:0 0 10px 10px;">
      <p><strong>Nom :</strong> {{ contact.name }}</p>
      <p><strong>Email :</strong> {{ contact.email }}</p>
      <p><strong>Telephone :</strong> {% if contact.phone %}{{ contact.phone }}{% else %}Non indique{% endif %}</p>
      <p><strong>Type de projet :</strong> {{ project_type_label }}</p>
      <h2 style="margin:24px 0 14px;font-size:18px;">Message</h2>
      <p style="line-height:1.6;">{{ contact.message|linebreaksbr }}</p>
    </div>
  </div>
</body>
</html>
