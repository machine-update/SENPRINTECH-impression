{% extends "base.html" %}
{% block title %}Mot de passe oublié - SenPrinTech{% endblock %}

{% block content %}
<section class="account-page">
    <div class="section-inner account-narrow">
        <div class="account-card auth-card">
            <p class="eyebrow">Sécurité</p>
            <h1>Réinitialiser le mot de passe</h1>
            <p class="account-muted">Entrez l'email de votre compte. Si un compte existe, vous recevrez un lien sécurisé.</p>
            <form method="post" class="auth-form">
                {% csrf_token %}
                <label>
                    <span>{{ form.email.label }}</span>
                    {{ form.email }}
                    {% for error in form.email.errors %}<small>{{ error }}</small>{% endfor %}
                </label>
                <button class="button button-primary" type="submit">Recevoir le lien</button>
            </form>
            <p class="account-switch"><a href="{% url 'accounts:login' %}">Retour à la connexion</a></p>
        </div>
    </div>
</section>
{% endblock %}
