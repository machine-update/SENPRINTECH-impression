{% extends "base.html" %}
{% block title %}Email envoyé - SenPrinTech{% endblock %}

{% block content %}
<section class="account-page">
    <div class="section-inner account-narrow">
        <div class="account-card auth-card">
            <p class="eyebrow">Email envoyé</p>
            <h1>Vérifiez votre boîte mail</h1>
            <p class="account-muted">Si un compte existe avec cette adresse, un lien de réinitialisation vient d'être envoyé.</p>
            <a href="{% url 'accounts:login' %}" class="button button-primary">Retour à la connexion</a>
        </div>
    </div>
</section>
{% endblock %}
