<!doctype html>
<html lang="fr">
<body style="margin:0;background:#f6f6f6;font-family:Arial,sans-serif;color:#111;">
  <div style="max-width:640px;margin:0 auto;padding:28px;">
    <div style="background:#080808;color:#fff;padding:26px;border-radius:10px 10px 0 0;">
      <p style="margin:0 0 8px;color:#d4af37;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;">SenPrinTech</p>
      <h1 style="margin:0;font-size:24px;">Réinitialisation du mot de passe</h1>
    </div>
    <div style="background:#fff;padding:26px;border:1px solid #eee;border-top:0;border-radius:0 0 10px 10px;">
      <p>Bonjour,</p>
      <p style="line-height:1.6;">Cliquez sur le bouton ci-dessous pour choisir un nouveau mot de passe SenPrinTech.</p>
      <p style="margin:28px 0;"><a href="{{ protocol }}://{{ domain }}{% url 'accounts:password_reset_confirm' uidb64=uid token=token %}" style="background:#080808;color:#fff;padding:14px 18px;border-radius:6px;text-decoration:none;font-weight:700;">Réinitialiser mon mot de passe</a></p>
      <p style="color:#555;">Si vous n'êtes pas à l'origine de cette demande, ignorez cet email.</p>
    </div>
  </div>
</body>
</html>
